<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1440px;
            overflow: hidden;
            background: linear-gradient(135deg, #001A33 0%, #003366 50%, #001A33 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            padding: 80px;
            position: relative;
        }

        .glow {
            position: absolute;
            top: -150px;
            right: -150px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(225, 27, 34, 0.15), transparent 70%);
            pointer-events: none;
        }

        .tag {
            display: inline-block;
            background: #E11B22;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 24px;
            color: #fff;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 64px;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 30px;
            font-family: 'Montserrat', sans-serif;
        }

        h1 span {
            color: #E11B22;
        }

        .subtitle {
            font-size: 36px;
            color: #b0c4de;
            line-height: 1.5;
            font-weight: 500;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 60px 0;
            flex: 1;
            justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 35px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-label {
            font-size: 32px;
            color: #aab8c2;
            font-weight: 500;
        }

        .card-value {
            font-size: 48px;
            font-weight: 900;
            color: #E11B22;
            font-family: 'Montserrat', sans-serif;
        }

        .footer {
            display: flex;
            align-items: center;
            gap: 24px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #E11B22;
            border: 2px solid #fff;
        }

        .footer-user {
            font-size: 28px;
            color: #777;
            font-weight: 700;
        }

        .footer-action {
            margin-left: auto;
            font-size: 26px;
            color: #E11B22;
            font-weight: 800;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>
    <div class="glow"></div>
    <div class="tag">Mercado 2026</div>
    <h1>Relatório: <span>Oportunidades</span> em Portugal</h1>
    <p class="subtitle">Confira os números que provam por que agora é o momento ideal para investir.</p>

    <div class="cards">
        <div class="card">
            <span class="card-label">Valorização Anual</span>
            <span class="card-value">+7.4%</span>
        </div>
        <div class="card">
            <span class="card-label">Estabilidade de Preços</span>
            <span class="card-value">Média</span>
        </div>
        <div class="card">
            <span class="card-label">Novas Listagens</span>
            <span class="card-value">1.200+</span>
        </div>
    </div>

    <div class="footer">
        <div class="footer-logo"></div>
        <span class="footer-user">@ecristinalamarque</span>
        <span class="footer-action">LEIA MAIS →</span>
    </div>
</body>

</html>
