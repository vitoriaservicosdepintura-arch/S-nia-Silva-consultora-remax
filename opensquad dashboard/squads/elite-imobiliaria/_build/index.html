<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Post - Eliane Remax</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>

    <!-- SLIDE 1: CAPA PROFISSIONAL -->
    <div class="instagram-post" id="slide-1">
        <div class="shape shape-blue"></div>
        <div class="shape shape-red"></div>

        <div class="content">
            <div class="header">
                <div class="logo-container">
                    <div style="font-weight: 900; color: #fff; font-size: 32px;">RE/MAX</div>
                </div>
            </div>

            <h1 class="headline">Transforme<br>sonhos em<br><span>Conquistas</span></h1>

            <div class="footer">
                <div class="consultant-info">
                    <div class="consultant-name">Eliane Consultora</div>
                </div>
                <a href="#" class="cta-button">Saber Mais</a>
            </div>
        </div>

        <!-- Consultant Image - Corrigindo espaço no nome -->
        <img src="../materiais-eliane-consultora/4-removebg-preview%204%20alta%20qualidade.png" class="main-image"
            alt="Eliane Consultora" onerror="this.src='../materiais-eliane-consultora/1-removebg-preview.png'">
    </div>

    <div style="height: 50px;"></div>

    <!-- SLIDE 2: ANÚNCIO DE IMÓVEL -->
    <div class="instagram-post" id="slide-5">
        <!-- Background Imagem do Imóvel - Corrigindo nome do arquivo -->
        <img src="../imovel-venda/casa-1.jpg"
            style="position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 0;"
            alt="Imóvel" onerror="this.src='../imovel-venda/5.jpg'">

        <div
            style="position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(0deg, rgba(0,61,165,0.7) 0%, rgba(255,255,255,0) 60%); z-index: 1;">
        </div>

        <div class="content">
            <div class="header">
                <div class="logo-container">
                    <div
                        style="background: #fff; padding: 10px 20px; border-radius: 4px; font-weight: 900; color: #E11B22;">
                        RE/MAX</div>
                </div>
            </div>

            <div class="property-card">
                <div class="price-tag">63.000 €</div>
                <h2 class="property-title">Moradia T2 em Além do Rio</h2>
                <div class="details-grid">
                    <div class="detail-item">🛏️ 2 Quartos</div>
                    <div class="detail-item">🛁 2 WC</div>
                    <div class="detail-item">📐 275m² Lote</div>
                    <div class="detail-item">🏠 45m² Privada</div>
                </div>
            </div>

            <div class="footer">
                <div class="consultant-info">
                    <div class="consultant-name">Oportunidade Única</div>
                </div>
                <a href="#" class="cta-button">Agendar Visita</a>
            </div>
        </div>
    </div>

</body>

</html>
