<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1440px;
            overflow: hidden;
            background: #001A33;
            /* Deep RE/MAX-style Blue */
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            padding: 80px;
            position: relative;
        }

        .header {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-image: url('assets/logo.png');
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            border: 3px solid #fff;
            background-color: #E11B22;
            /* Fallback */
        }

        .name {
            font-weight: 700;
            font-size: 38px;
            color: #fff;
        }

        .verified {
            fill: #fff;
            margin-left: 8px;
        }

        .username {
            font-size: 28px;
            color: #aab8c2;
        }

        .tweet-text {
            font-size: 44px;
            line-height: 1.5;
            font-weight: 500;
            margin-top: 60px;
        }

        .tweet-text span {
            color: #E11B22;
            font-weight: 700;
        }

        .footer-image {
            width: 100%;
            height: 500px;
            background-image: url('assets/hero-bg.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 32px;
            margin-top: auto;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            border: 1px solid #1a3a5a;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="avatar"></div>
        <div>
            <div style="display:flex;align-items:center;">
                <span class="name">Eliane Consultora RE/MAX</span>
                <svg class="verified" width="30" height="30" viewBox="0 0 24 24">
                    <path
                        d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.34 2.19c-1.39-.46-2.9-.2-3.91.81s-1.27 2.52-.81 3.91C2.63 9.33 1.75 10.57 1.75 12s.88 2.67 2.19 3.34c-.46 1.39-.2 2.9.81 3.91s2.52 1.27 3.91.81c.66 1.31 1.91 2.19 3.34 2.19s2.67-.88 3.34-2.19c1.39.46 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.08 4.71c-.22.22-.58.22-.8 0L7.4 13.74c-.22-.22-.22-.58 0-.8.22-.22.58-.22.8 0l2.57 2.57 6.03-6.03c.22-.22.58-.22.8 0 .22.22.22.58 0 .8l-6.43 6.43z" />
                </svg>
            </div>
            <span class="username">@ecristinalamarque</span>
        </div>
    </div>
    <div class="tweet-text">
        "É assim que <span>subir de nível</span> deve ser: segurança na escritura e retorno garantido no investimento."
        <br><br>
        Portugal hoje é o destino número 1 para investidores que buscam estabilidade. Você está pronto para o próximo
        passo?
    </div>
    <div class="footer-image">
    </div>
</body>

</html>
