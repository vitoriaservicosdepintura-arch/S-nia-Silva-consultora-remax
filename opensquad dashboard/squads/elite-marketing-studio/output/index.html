<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anúncio Interativo - Eliane Remax</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Ajuste de responsividade */
        .carousel-container {
            max-width: 100vw;
            max-height: 100vh;
            margin: auto;
            transform-origin: top center;
        }

        @media (max-height: 1350px) {
            .carousel-container {
                transform: scale(0.6);
                /* Reduz para caber em telas menores */
            }
        }
    </style>
</head>

<body>

    <div class="carousel-container">
        <!-- Overlay Fixo: Logo -->
        <div class="overlay-brand">
            <img src="../../elite-imobiliaria/materiais-eliane-consultora/logo1.png" style="height: 40px;" alt="Logo"
                onerror="this.src='https://via.placeholder.com/150?text=REMAX'">
        </div>

        <!-- Overlay Fixo: Consultora -->
        <div class="overlay-consultant">
            <img src="../../elite-imobiliaria/materiais-eliane-consultora/4-removebg-preview%204%20alta%20qualidade.png"
                class="consultant-photo" alt="Eliane">
            <div style="color: #003DA5; font-weight: 700;">Eliane Consultora</div>
        </div>

        <!-- SLIDE 1: EXTERIOR -->
        <div class="slide active" id="s1">
            <img src="../../elite-imobiliaria/imovel-venda/casa-1.jpg" class="slide-img"
                onerror="this.src='../../elite-imobiliaria/imovel-venda/5.jpg'">

            <div class="info-card">
                <div class="price-badge">63.000 €</div>
                <h2 style="margin: 0 0 10px 0; font-size: 28px; text-transform: uppercase;">Moradia T2 em Além do Rio
                </h2>
                <p style="margin: 0; opacity: 0.9; font-size: 18px;">Oportunidade única para investimento.</p>
            </div>

            <div class="hotspot" style="top: 70%; left: 30%;">
                +
                <div class="hotspot-tooltip">Área Total do Lote: 275m²</div>
            </div>
        </div>

        <!-- SLIDE 2: SALA -->
        <div class="slide" id="s2">
            <img src="../../elite-imobiliaria/imovel-venda/sala-1.jpg" class="slide-img">
            <div class="info-card">
                <h2 style="margin: 0; font-size: 28px;">Espaços Acolhedores</h2>
            </div>
            <div class="hotspot" style="top: 55%; left: 60%;">
                +
                <div class="hotspot-tooltip">Área Útil: 65m² de conforto.</div>
            </div>
        </div>

        <!-- SLIDE 3: COZINHA -->
        <div class="slide" id="s3">
            <img src="../../elite-imobiliaria/imovel-venda/cozinha-1.jpg" class="slide-img">
            <div class="info-card">
                <h2 style="margin: 0; font-size: 28px;">Cozinha Equipada</h2>
            </div>
            <div class="hotspot" style="top: 45%; left: 45%;">
                +
                <div class="hotspot-tooltip">Ano de Construção: 1970.</div>
            </div>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" onclick="prevSlide()">❮</button>
            <button class="nav-btn" onclick="nextSlide()">❯</button>
        </div>

        <div
            style="position: absolute; top: 20px; right: 40px; background: rgba(0,0,0,0.6); padding: 8px 18px; border-radius: 20px; font-weight: bold; z-index: 500; font-size: 20px;">
            <span id="slide-number">1</span> / 3
        </div>
    </div>

    <script>
        let currentSlide = 1;
        const totalSlides = 3;

        function updateSlide() {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById('s' + currentSlide).classList.add('active');
            document.getElementById('slide-number').innerText = currentSlide;
        }

        function nextSlide() {
            currentSlide = currentSlide >= totalSlides ? 1 : currentSlide + 1;
            updateSlide();
        }

        function prevSlide() {
            currentSlide = currentSlide <= 1 ? totalSlides : currentSlide - 1;
            updateSlide();
        }

        // Suporte a teclas de seta
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") nextSlide();
            if (e.key === "ArrowLeft") prevSlide();
        });
    </script>
</body>

</html>
